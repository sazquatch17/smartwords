# Project-as-code. Run `xcodegen generate --spec ios/project.yml` to (re)create
# SmartWords.xcodeproj — no hand-clicking targets/capabilities in Xcode.
name: SmartWords
options:
  bundleIdPrefix: com.example.smartwords
  deploymentTarget:
    iOS: "17.0"            # containerBackground (widgets) needs iOS 17
settings:
  base:
    SWIFT_VERSION: "5.0"   # skip Swift 6 strict concurrency for the skeleton
    CODE_SIGN_IDENTITY: "-"   # ad-hoc sign so App Group entitlement is embedded on the simulator
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
targets:
  SmartWords:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
      - path: ../shared/seed-words.json   # app reads the same seed for word detail
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        UIAppFonts:                          # bundled Lexica design fonts (variable)
          - Newsreader.ttf
          - Newsreader-Italic.ttf
          - HankenGrotesk.ttf
          - SplineSansMono.ttf
        CFBundleURLTypes:
          - CFBundleURLSchemes: [smartwords]   # deep link from the widget tap
    entitlements:
      path: App/SmartWords.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.example.smartwords
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.smartwords
    dependencies:
      - target: SmartWordsWidgetExtension
        embed: true

  SmartWordsWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - Shared
      - path: Widget/SmartWordsWidget.swift
      - path: App/Fonts                   # same design fonts, for the widget
        buildPhase: resources
      - path: ../shared/seed-words.json   # bundled into the widget; read at render
        buildPhase: resources
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: SmartWords
        UIAppFonts:
          - Newsreader.ttf
          - Newsreader-Italic.ttf
          - HankenGrotesk.ttf
          - SplineSansMono.ttf
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/SmartWordsWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.example.smartwords
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.smartwords.widget
