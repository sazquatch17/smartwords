# Project-as-code. Run `xcodegen generate --spec ios/project.yml` to (re)create
# SmartWords.xcodeproj — no hand-clicking targets/capabilities in Xcode.
name: SmartWords
options:
  bundleIdPrefix: com.example.smartwords
  deploymentTarget:
    iOS: "17.0"            # containerBackground (widgets) needs iOS 17
settings:
  base:
    SWIFT_VERSION: "5.0"   # skip Swift 6 strict concurrency for the skeleton
    CODE_SIGNING_ALLOWED: "NO"   # simulator builds need no signing
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
targets:
  SmartWords:
    type: application
    platform: iOS
    sources:
      - App
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.smartwords
    dependencies:
      - target: SmartWordsWidgetExtension
        embed: true

  SmartWordsWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget/SmartWordsWidget.swift
      - path: ../shared/seed-words.json   # bundled into the widget; read at render
        buildPhase: resources
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: SmartWords
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.smartwords.widget
